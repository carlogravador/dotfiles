---
# Install Neovim and its dependencies.
#
# Ansible Concepts:
#   - "when" is a conditional. The task only runs if the condition is true.
#   - "ansible_os_family" is a fact gathered automatically (e.g., "Darwin" for macOS,
#     "Debian" for Ubuntu/Debian). You can see all facts with: ansible localhost -m setup
#   - "community.general.homebrew" is a module for managing Homebrew packages.
#   - "ansible.builtin.apt" is a module for managing apt packages (Debian/Ubuntu).
#   - "become: true" means "run as root" (equivalent to sudo). Required for apt.
#   - "loop" iterates over a list, running the task once per item.
#     The current item is available as {{ item }}.

# --- macOS (Homebrew) ---

- name: Install Neovim and dependencies via Homebrew (macOS)
  community.general.homebrew:
    name: "{{ item }}"
    state: present
  loop:
    - neovim
    - ripgrep # Fast regex search (used by fzf-lua live grep)
    - fd # Fast file finder (used by fzf-lua file finder)
    - bat # preview
    - fzf # Fuzzy finder binary (used by fzf-lua)
    - node # Required by some LSP servers and Mason packages, and copilot.vim
    - tree-sitter-cli # Parser generator (used by nvim-treesitter)
    - cmake # Build tool needed for some treesitter parsers
    - unzip # Needed by Mason to install some LSP servers
    - llvm # Provides clangd (C/C++ language server)
    - lua-language-server # Lua LSP server (used by lua_ls in nvim-lspconfig)
  when: ansible_os_family == "Darwin"

# Install LSP server binaries via OS package managers / language package managers
# (NPM / pip) so we don't rely on Mason during editor runtime.
- name: Install common LSP servers (npm global) on macOS
  ansible.builtin.command: npm install -g pyright bash-language-server dockerfile-language-server-nodejs @github/copilot-language-server
  when: ansible_os_family == "Darwin"

- name: Install cmake-language-server via pip (macOS)
  ansible.builtin.pip:
    name: cmake-language-server
    state: present
    executable: pip3
  when: ansible_os_family == "Darwin"

# --- Ubuntu / Debian (AppImage) ---

# The Neovim PPA is not kept up to date. Instead, we fetch the latest release
# directly from GitHub, download the AppImage, and register it via
# update-alternatives so that both `vim` and `nvim` point to it.

- name: Install Neovim runtime dependencies via apt (Ubuntu/Debian)
  ansible.builtin.apt:
    name: "{{ item }}"
    state: present
    update_cache: true
  loop:
    - ripgrep
    - fd-find # fd is packaged as "fd-find" on Debian/Ubuntu
    - fzf
    - bat # preview
    - nodejs
    - npm
    - build-essential # C compiler, make, etc. (needed for treesitter parsers)
    - cmake
    - unzip
    - curl
    - clangd
    - libfuse2 # Required by AppImage runtime
  become: true
  when: ansible_os_family == "Debian"

# Query the GitHub Releases API to discover the latest stable Neovim version.
# "register" saves the HTTP response body so later tasks can read it.
- name: Get latest Neovim release info from GitHub API (Ubuntu/Debian)
  ansible.builtin.uri:
    url: https://api.github.com/repos/neovim/neovim/releases/latest
    return_content: true
    # Authenticate when a token is available to avoid the 60 req/h unauthenticated limit.
    headers: "{{ {'Authorization': 'Bearer ' + github_token} if (github_token | default('') != '') else {} }}"
  register: nvim_release_info
  when: ansible_os_family == "Debian"

# Map ansible_architecture (e.g. "aarch64") to the naming used in the AppImage
# filenames ("arm64"). x86_64 is used as-is.
- name: Set Neovim version and architecture facts (Ubuntu/Debian)
  ansible.builtin.set_fact:
    nvim_version: "{{ nvim_release_info.json.tag_name }}"
    nvim_arch: "{{ 'arm64' if ansible_architecture == 'aarch64' else ansible_architecture }}"
  when: ansible_os_family == "Debian"

# Versioned install directory keeps old releases around and makes rollbacks trivial.
- name: Create versioned Neovim install directory (Ubuntu/Debian)
  ansible.builtin.file:
    path: "/opt/neovim/{{ nvim_version }}"
    state: directory
    mode: "0755"
  become: true
  when: ansible_os_family == "Debian"

# "force: false" (the default) skips the download if the file already exists,
# making this task idempotent on re-runs.
- name: Download Neovim AppImage (Ubuntu/Debian)
  ansible.builtin.get_url:
    url: "https://github.com/neovim/neovim/releases/download/{{ nvim_version }}/nvim-linux-{{ nvim_arch }}.appimage"
    dest: "/opt/neovim/{{ nvim_version }}/nvim.appimage"
    mode: "0755"
  become: true
  when: ansible_os_family == "Debian"

# Register the AppImage as a "vim" alternative with priority 60, which is higher
# than the system vim (usually priority 1) so Neovim wins by default.
- name: Register Neovim AppImage as vim alternative (Ubuntu/Debian)
  ansible.builtin.command:
    cmd: >-
      update-alternatives --install /usr/bin/vim vim
      /opt/neovim/{{ nvim_version }}/nvim.appimage 60
  become: true
  when: ansible_os_family == "Debian"
  # update-alternatives --install is always exit 0; suppress spurious "changed" reports.
  changed_when: false

# Also register under "nvim" so the canonical Neovim binary name works.
- name: Register Neovim AppImage as nvim alternative (Ubuntu/Debian)
  ansible.builtin.command:
    cmd: >-
      update-alternatives --install /usr/bin/nvim nvim
      /opt/neovim/{{ nvim_version }}/nvim.appimage 60
  become: true
  when: ansible_os_family == "Debian"
  changed_when: false

- name: Set Neovim AppImage as default vim (Ubuntu/Debian)
  ansible.builtin.command:
    cmd: "update-alternatives --set vim /opt/neovim/{{ nvim_version }}/nvim.appimage"
  become: true
  when: ansible_os_family == "Debian"
  changed_when: false

- name: Set Neovim AppImage as default nvim (Ubuntu/Debian)
  ansible.builtin.command:
    cmd: "update-alternatives --set nvim /opt/neovim/{{ nvim_version }}/nvim.appimage"
  become: true
  when: ansible_os_family == "Debian"
  changed_when: false

# LSP server installs for Debian/Ubuntu are in install_lsp.yml (included below).
- name: Include additional LSP install tasks
  ansible.builtin.include_tasks: install_lsp.yml
  when: ansible_os_family == "Debian"

# On Debian/Ubuntu, fd is installed as "fdfind". Create a symlink so
# tools that expect the "fd" binary name work correctly.
- name: Symlink fdfind to fd (Ubuntu/Debian)
  ansible.builtin.file:
    src: /usr/bin/fdfind
    dest: /usr/local/bin/fd
    state: link
  become: true
  when: ansible_os_family == "Debian"
  # "ignore_errors" prevents failure if the symlink already exists
  # or if fdfind is not at the expected path.
  ignore_errors: true

# On Debian/Ubuntu, bat is installed as "batcat". Create a symlink so
# tools that expect the "bat" binary name work correctly.
- name: Symlink batcat to bat (Ubuntu/Debian)
  ansible.builtin.file:
    src: /usr/bin/batcat
    dest: /usr/local/bin/bat
    state: link
  become: true
  when: ansible_os_family == "Debian"
  # "ignore_errors" prevents failure if the symlink already exists
  # or if fdfind is not at the expected path.
  ignore_errors: true
