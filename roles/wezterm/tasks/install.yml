---
# roles/wezterm/tasks/install.yml — Ensure WezTerm is installed
#
# WezTerm is a GPU-accelerated terminal emulator. On macOS it is distributed
# as a Homebrew cask (GUI app). Linux installation is handled via the apt
# package or a direct .deb download.

- name: Check for existing wezterm binary
  ansible.builtin.command:
    cmd: "command -v wezterm"
  register: wezterm_check
  changed_when: false
  failed_when: false

- name: Install WezTerm via Homebrew cask (macOS)
  community.general.homebrew_cask:
    name: wezterm
    state: present
  when: ansible_os_family == "Darwin" and wezterm_check.rc != 0
  become: false

- name: Install WezTerm via apt (Debian/Ubuntu)
  ansible.builtin.apt:
    name: wezterm
    state: present
    update_cache: true
  become: true
  when: ansible_os_family == "Debian" and wezterm_check.rc != 0
